<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">Menu</div>
    <ul>
      <li><a href="dashboard.html">&#128202; Dashboard</a></li>
      <li><a href="transactions.html?view=add">&#10133; Add Transaction</a></li>
      <li><a href="transactions.html?view=list">&#128203; View Transactions</a></li>
      <li><a href="#" onclick="logout()">&#128682; Logout</a></li>
    </ul>
  </nav>

  <header>
    <div class="header-left">
      <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
      <span class="app-name">&#128176; Finance Tracker</span>
    </div>
    <span class="user-badge" id="user-badge"></span>
  </header>

  <main>
    <h2 class="section-title">Overview</h2>

    <div class="summary-cards">
      <div class="summary-card income-card">
        <div class="card-label">Total Income</div>
        <div class="card-value" id="total-income">$0.00</div>
      </div>
      <div class="summary-card expense-card">
        <div class="card-label">Total Expenses</div>
        <div class="card-value" id="total-expense">$0.00</div>
      </div>
      <div class="summary-card balance-card">
        <div class="card-label">Balance</div>
        <div class="card-value" id="balance">$0.00</div>
      </div>
    </div>

    <div class="chart-wrapper">
      <h3 class="chart-title">Income vs Expenses</h3>
      <div class="chart-container">
        <canvas id="pie-chart"></canvas>
      </div>
      <p class="no-data" id="no-data">No transactions yet. <a href="transactions.html?view=add">Add one</a> to get started.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
