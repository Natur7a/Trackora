<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>💰</span>
      <h1>Finance Tracker</h1>
      <p>Manage your money, effortlessly.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="form active">
      <div id="login-error" class="error"></div>
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" />
      <button class="btn btn-login" onclick="handleLogin()">Login</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="form">
      <div id="register-error" class="error"></div>
      <div id="register-success" class="success"></div>
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" />
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters" />
      <label for="reg-confirm">Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="Repeat your password" />
      <button class="btn btn-register" onclick="handleRegister()">Create Account</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
