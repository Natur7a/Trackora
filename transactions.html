<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Transactions</title>
  <link rel="stylesheet" href="transactions.css" />
</head>
<body>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">Menu</div>
    <ul>
      <li><a href="dashboard.html">&#128202; Dashboard</a></li>
      <li><a href="transactions.html?view=add" onclick="showSection('add')">&#10133; Add Transaction</a></li>
      <li><a href="transactions.html?view=list" onclick="showSection('list')">&#128203; View Transactions</a></li>
      <li><a href="#" onclick="logout()">&#128682; Logout</a></li>
    </ul>
  </nav>

  <header>
    <div class="header-left">
      <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
      <span class="app-name">&#128176; Finance Tracker</span>
    </div>
    <span class="user-badge" id="user-badge"></span>
  </header>

  <main>
    <!-- Add Transaction Section -->
    <section id="section-add" class="section">
      <h2 class="section-title">Add Transaction</h2>
      <div class="form-card">
        <div class="form-error" id="form-error"></div>
        <div class="form-group">
          <label for="tx-amount">Amount (required)</label>
          <input type="number" id="tx-amount" placeholder="0.00" min="0.01" step="0.01" />
        </div>
        <div class="form-group">
          <label for="tx-type">Type</label>
          <select id="tx-type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tx-category">Category</label>
          <select id="tx-category">
            <option value="Salary">Salary</option>
            <option value="Investment">Investment</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tx-date">Date</label>
          <input type="date" id="tx-date" />
        </div>
        <div class="form-group">
          <label for="tx-note">Note (optional)</label>
          <input type="text" id="tx-note" placeholder="Brief description" />
        </div>
        <button class="btn btn-add" onclick="addTransaction()">Add Transaction</button>
      </div>
    </section>

    <!-- View Transactions Section -->
    <section id="section-list" class="section hidden">
      <h2 class="section-title">Transactions</h2>

      <div class="summary-bar">
        <span class="summary-item income-text">Income: <strong id="list-income">$0.00</strong></span>
        <span class="summary-item expense-text">Expenses: <strong id="list-expense">$0.00</strong></span>
        <span class="summary-item balance-text">Balance: <strong id="list-balance">$0.00</strong></span>
      </div>

      <div id="tx-list">
        <p class="empty-msg">No transactions found.</p>
      </div>
    </section>
  </main>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>Edit Transaction</h3>
      <div class="form-group">
        <label for="edit-amount">Amount</label>
        <input type="number" id="edit-amount" min="0.01" step="0.01" />
      </div>
      <div class="form-group">
        <label for="edit-type">Type</label>
        <select id="edit-type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="form-group">
        <label for="edit-category">Category</label>
        <select id="edit-category">
          <option value="Salary">Salary</option>
          <option value="Investment">Investment</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="edit-date">Date</label>
        <input type="date" id="edit-date" />
      </div>
      <div class="form-group">
        <label for="edit-note">Note</label>
        <input type="text" id="edit-note" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-save" onclick="saveEdit()">Save</button>
        <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="transactions.js"></script>
</body>
</html>
